services:
  zulip-postgres:
    build:
      context: ./reference/oss/zulip
      dockerfile: Dockerfile-postgresql
      args:
        POSTGRESQL_VERSION: "14"
        PGROONGA_VERSION: latest
    image: link-life-zulip-postgresql:14
    container_name: link-life-zulip-postgres
    environment:
      POSTGRES_PASSWORD: link_life_postgres_admin
    ports:
      - "5433:5432"
    volumes:
      - zulip-postgres-data:/var/lib/postgresql/data
      - ./docker/zulip-postgres/99-set-zulip-password.sql:/docker-entrypoint-initdb.d/zz-link-life-set-zulip-password.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  zulip-postgres-data:
